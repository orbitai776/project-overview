info:
  name: getAllUsers
  type: http
  seq: 1

http:
  method: GET
  url: "{{host-gateway}}/v1/api/admin/users"
  headers:
    - name: Authorization
      value: " Bearer {{token-admin}}"
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080/api/v1

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
